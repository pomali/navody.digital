default: &default
  google:
    client_id: <%= ENV.fetch('GOOGLE_CLIENT_ID', nil) %>
    client_secret: <%= ENV.fetch('GOOGLE_CLIENT_SECRET', nil) %>

  brevo:
    api_key: <%= ENV.fetch('BREVO_API_KEY', nil) %>
    doi_template_id: <%= ENV.fetch('BREVO_DOI_TEMPLATE_ID', nil) %>

  eid:
    base_url: <%= ENV.fetch('AUTH_EID_BASE_URL', nil) %>
    public_key: <%= ENV.fetch('AUTH_EID_PUBLIC_KEY', nil).inspect %>
    private_key: <%= ENV.fetch('AUTH_EID_PRIVATE_KEY', nil).inspect %>

development:
  <<: *default

test:
  <<: *default
  brevo:
    api_key: ''
    doi_template_id: ''

staging:
  <<: *default

production:
  <<: *default
